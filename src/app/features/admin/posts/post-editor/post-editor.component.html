<div class="h-[calc(100vh-6rem)] bg-gray-50/50 flex overflow-hidden">
  <div class="flex flex-1 overflow-hidden">

    <div class="flex-1 overflow-y-auto p-6 pr-3">
      <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">

        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-bold text-gray-900">
            {{ isEditing() ? 'Editar Conteúdo' : 'Novo Conteúdo' }}
          </h1>
          <button type="button" routerLink="/admin/posts" class="text-gray-500 hover:text-gray-700">
            Cancelar
          </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Tipo de Postagem</label>
              <select formControlName="type" class="w-full rounded-lg border-gray-300 focus:ring-blue-500">
                <option *ngFor="let t of postTypes" [value]="t">{{ t }}</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Sistema Relacionado</label>
              <select formControlName="productSystem" class="w-full rounded-lg border-gray-300 focus:ring-blue-500">
                <option *ngFor="let s of systems" [value]="s">{{ s }}</option>
              </select>
            </div>
          </div>

          <div class="mb-8">
            <label class="block text-sm font-bold text-gray-700 mb-2">Capa da Postagem</label>
            <div class="flex items-center gap-6">
              <div class="relative group w-48 h-32 bg-gray-100 rounded-xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center overflow-hidden transition-all hover:border-blue-400">
                <ng-container *ngIf="form.get('coverImage')?.value; else noImage">
                  <img [src]="form.get('coverImage')?.value" class="w-full h-full object-cover">
                  <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                    <button type="button" (click)="fileInput.click()" class="p-2 bg-white rounded-full text-gray-700 hover:text-blue-600">✏️</button>
                    <button type="button" (click)="removeImage()" class="p-2 bg-white rounded-full text-red-600">🗑️</button>
                  </div>
                </ng-container>
                <ng-template #noImage>
                  <button type="button" (click)="fileInput.click()" class="text-gray-400 text-xs font-medium">Upload da Capa</button>
                </ng-template>
                <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="col-span-2">
              <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
              <input type="text" formControlName="title" (input)="generateSlug()" class="w-full rounded-lg border-gray-300 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Slug (URL)</label>
              <input type="text" formControlName="slug" class="w-full rounded-lg border-gray-300 bg-gray-50">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Versão (Se aplicável)</label>
              <input type="text" formControlName="version" placeholder="ex: 1.0.0" class="w-full rounded-lg border-gray-300">
            </div>
          </div>

          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-sm font-medium text-gray-700">Resumo</label>
              <span class="text-xs text-gray-400">
              {{ (form.get('summary')?.value || '').length }}/500    </span>
            </div>

            <textarea
              formControlName="summary"
              rows="3"
              maxlength="500"
              class="w-full rounded-lg border-gray-300 focus:ring-blue-500 focus:border-blue-500"
              [class.border-red-500]="form.get('summary')?.invalid && form.get('summary')?.touched">
  </textarea>

            <p *ngIf="form.get('summary')?.hasError('maxlength')" class="mt-1 text-xs text-red-500">
              O resumo nao pode ultrapassar 500 caracteres.
            </p>
          </div>

          <div class="flex items-center gap-3">
            <input type="checkbox" formControlName="isPublished" id="isPublished" class="rounded text-blue-600 focus:ring-blue-500">
            <label for="isPublished" class="text-sm font-medium text-gray-700">Publicar imediatamente</label>
          </div>

          <div class="mt-8 border-t border-gray-100 pt-8">
            <h3 class="text-lg font-semibold text-gray-900 mb-4">Conteúdo da Postagem</h3>
            <app-block-manager [blocks]="blocks()" (blocksChange)="updateBlocks($event)"></app-block-manager>
          </div>

          <div class="pt-6 border-t border-gray-100 flex justify-end">
            <button type="submit" [disabled]="isLoading() || form.invalid" class="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition-colors">
              {{ isLoading() ? 'Salvando...' : (form.get('isPublished')?.value ? 'Publicar Conteúdo' : 'Salvar Rascunho') }}
            </button>
          </div>

        </form>
      </div>
    </div>

    <div class="w-80 pl-3 pr-6 py-6 overflow-y-auto flex-shrink-0 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">

      <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">

        <h3 class="text-xs font-bold text-gray-500 mb-4 uppercase tracking-wider flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          Adicionar Bloco
        </h3>

        <div class="space-y-3">

          <button type="button" (click)="addBlockFromSidebar('HEADER')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-indigo-300 hover:shadow-sm hover:bg-indigo-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-indigo-600 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-indigo-900 transition-colors">Título</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('TEXT')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-blue-300 hover:shadow-sm hover:bg-blue-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-blue-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-blue-900 transition-colors">Texto</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('IMAGE')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-emerald-300 hover:shadow-sm hover:bg-emerald-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-emerald-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-emerald-900 transition-colors">Imagem</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('COMPARISON')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-orange-300 hover:shadow-sm hover:bg-orange-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-orange-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-orange-900 transition-colors">Comparativo</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('CHECKLIST')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-teal-300 hover:shadow-sm hover:bg-teal-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-teal-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-teal-900 transition-colors">Checklist</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('MODULE_HIGHLIGHT')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-amber-300 hover:shadow-sm hover:bg-amber-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-amber-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-amber-900 transition-colors">Highlight Module</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('ALERT')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-red-300 hover:shadow-sm hover:bg-red-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-red-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-red-900 transition-colors">Alerta</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('TIMELINE')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-purple-300 hover:shadow-sm hover:bg-purple-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-purple-500 flex items-center justify-center text-white transition-transform group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-purple-900 transition-colors">Linha do Tempo</div></div>
          </button>

          <button type="button" (click)="addBlockFromSidebar('YOUTUBE')" class="w-full p-3 rounded-lg border-2 border-gray-100 hover:border-red-400 hover:shadow-sm hover:bg-red-50/50 transition-all duration-200 flex items-center gap-3 group">
            <div class="w-8 h-8 rounded bg-red-600 flex items-center justify-center text-white transition-transform group-hover:scale-105 shadow-sm">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347c-.75.412-1.667-.13-1.667-.986V5.653Z" />
              </svg>
            </div>
            <div class="text-left"><div class="font-semibold text-sm text-gray-700 group-hover:text-red-900 transition-colors">Vídeo (YouTube)</div></div>
          </button>

        </div>
      </div>
    </div>

  </div>
</div>
